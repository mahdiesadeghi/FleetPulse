name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the committed lockfile (avoids npm-version
          # mismatches during `npm ci`) and satisfies Angular 21's engine range.
          node-version: 24
          cache: npm

      - run: npm ci

      # Project site lives under /FleetPulse/, so the base href must match.
      - run: npx ng build --base-href /FleetPulse/

      # Single-page-app fallback: Pages serves 404.html for unknown paths,
      # so a copy of index.html lets Angular's router handle deep links.
      - run: cp dist/fleetpulse/browser/index.html dist/fleetpulse/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/fleetpulse/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
